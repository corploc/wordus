name: Release & Docker

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/wordus

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Build & Push Docker
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.ref_name }}
          build-args: |
            NUXT_UMAMI_WEBSITE_ID=${{ secrets.NUXT_UMAMI_WEBSITE_ID }}
            NUXT_UMAMI_HOST=${{ secrets.NUXT_UMAMI_HOST }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Trigger Komodo Redeploy
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: POST signed webhook to Komodo
        env:
          KOMODO_WEBHOOK_URL: https://webhook.minist.re/komodo/listener/github/stack/wordus/deploy
          KOMODO_WEBHOOK_SECRET: ${{ secrets.KOMODO_WEBHOOK_SECRET }}
          # Komodo verifies body.ref strips "refs/heads/" then matches stack.config.branch.
          # Workflow runs on tag push but webhook payload needs refs/heads/<branch> to pass.
          PAYLOAD: '{"ref":"refs/heads/main","repository":{"full_name":"${{ github.repository }}"},"after":"${{ github.sha }}","tag":"${{ github.ref_name }}"}'
        run: |
          set -euo pipefail
          SIG="sha256=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "$KOMODO_WEBHOOK_SECRET" -hex | awk '{print $2}')"
          curl -sSf -X POST "$KOMODO_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: $SIG" \
            -d "$PAYLOAD"
