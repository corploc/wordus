version: 2

updates:
  # Nuxt / pnpm deps
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 8
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      nuxt:
        patterns:
          - "nuxt"
          - "@nuxt/*"
          - "@nuxtjs/*"
          - "nuxt-*"
      vue:
        patterns:
          - "vue"
          - "vue-*"
          - "@vue/*"
          - "pinia"
          - "@pinia/*"
      socket:
        patterns:
          - "socket.io*"
          - "engine.io*"
          - "nuxt-socket-io"
      dev:
        dependency-type: "development"

  # Dockerfile base images
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(docker)"

  # Workflow action versions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(ci)"
    groups:
      actions:
        patterns:
          - "*"
